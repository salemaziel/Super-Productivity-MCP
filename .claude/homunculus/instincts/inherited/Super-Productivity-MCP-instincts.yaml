# Super Productivity MCP Workflow Security Hardening And Validation

## Action

Follow the security-hardening-and-validation workflow:
1. Modify src/ipc/directories.ts to add or improve security checks (e.g., permissions, symlink rejection, path validation).
2. Update or create validation tests in tests/unit/directories.test.ts to cover new security logic.
3. Optionally update plugin/plugin.js if plugin-level changes are needed.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/ipc/directories.ts, tests/unit/directories.test.ts, plugin/plugin.js

